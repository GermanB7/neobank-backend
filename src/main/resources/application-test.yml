spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/neobank_test
    username: neobank
    password: neobank

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.flywaydb: INFO
    org.springframework.security: DEBUG

server:
  port: 8080

security:
  jwt:
    issuer: neobank
    access-token-ttl-seconds: 900
    secret: TEST_SECRET_KEY_MINIMUM_64_CHARACTERS_LONG_0123456789ABCDEF

