spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/neobank
    username: neobank
    password: neobank
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 1800000
    cache-names:
      - user_by_email
      - role_by_name

  kafka:
    bootstrap-servers: localhost:29092
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        linger.ms: 10
        compression.type: snappy
    consumer:
      bootstrap-servers: localhost:29092
      group-id: neobank-outbox-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
      enable-auto-commit: true
      auto-commit-interval: 1000

logging:
  level:
    org.flywaydb: INFO
    org.springframework: INFO
    com.neobank: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{correlationId:-}] %logger{36} - %msg%n"

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,env,configprops
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        dependencies:
          include: db,redis,diskSpace,ping
  metrics:
    export:
      prometheus:
        enabled: true

security:
  jwt:
    issuer: neobank
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 1209600
    refresh-token-pepper: ${JWT_REFRESH_TOKEN_PEPPER:dev-refresh-pepper-change-in-production}
    secret: ${JWT_SECRET:dev-secret-change-in-production}

risk:
  policy:
    max-transfer-amount: 10000.00
    daily-outgoing-limit: 20000.00
    velocity-window-minutes: 10
    velocity-max-transfers: 5
    new-account-max-age-hours: 24
    new-account-high-value-threshold: 2500.00

neobank:
  ratelimit:
    enabled: true
  monitoring:
    prometheus-public-endpoint-enabled: true
  kafka:
    enabled: false
    publish-to-kafka: false
    topics:
      transfer-completed: "neobank.transfer.completed"
      transfer-rejected: "neobank.transfer.rejected"
      transfer-reversed: "neobank.transfer.reversed"
      account-created: "neobank.account.created"
      user-registered: "neobank.user.registered"

outbox:
  enabled: true
  processor:
    interval: 5000
    initial-delay: 1000
    batch-size: 100
    max-attempts: 3
    processing-timeout-ms: 300000
