spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/neobank
    username: neobank
    password: neobank

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org.flywaydb: INFO

server:
  port: 8080

security:
  jwt:
    issuer: neobank
    access-token-ttl-seconds: 900
    secret: CHANGE_ME_TO_A_LONG_RANDOM_SECRET_64_CHARACTERS_MINIMUM