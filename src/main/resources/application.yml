spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/neobank
    username: neobank
    password: neobank

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30 minutes in milliseconds
    cache-names:
      - user_by_email
      - role_by_name

  kafka:
    bootstrap-servers: localhost:29092
    producer:
      acks: all                     # Wait for all in-sync replicas to acknowledge
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        linger.ms: 10               # Batch small messages for efficiency
        compression.type: snappy    # Reduce network bandwidth
    consumer:
      bootstrap-servers: localhost:29092
      group-id: neobank-outbox-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"  # Allow deserialization from neobank packages
      enable-auto-commit: true
      auto-commit-interval: 1000

logging:
  level:
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{correlationId:-}] %logger{36} - %msg%n"

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

security:
  jwt:
    issuer: neobank
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 1209600
    refresh-token-pepper: CHANGE_ME_TO_A_LONG_RANDOM_REFRESH_PEPPER_64_CHARACTERS_MINIMUM
    secret: CHANGE_ME_TO_A_LONG_RANDOM_SECRET_64_CHARACTERS_MINIMUM

risk:
  policy:
    max-transfer-amount: 10000.00
    daily-outgoing-limit: 20000.00
    velocity-window-minutes: 10
    velocity-max-transfers: 5
    new-account-max-age-hours: 24
    new-account-high-value-threshold: 2500.00

neobank:
  ratelimit:
    enabled: true  # Enable rate limiting in production
  kafka:
    enabled: false                # Disable Kafka by default (local dev), enable in prod
    publish-to-kafka: false       # Whether outbox processor publishes to Kafka
    topics:
      transfer-completed: "neobank.transfer.completed"
      transfer-rejected: "neobank.transfer.rejected"
      transfer-reversed: "neobank.transfer.reversed"
      account-created: "neobank.account.created"
      user-registered: "neobank.user.registered"

outbox:
  enabled: true
  processor:
    interval: 5000              # milliseconds between processing cycles
    initial-delay: 1000         # milliseconds before first processing starts
    batch-size: 100             # number of events to process per cycle
    max-attempts: 3             # maximum retry attempts before marking FAILED
    processing-timeout-ms: 300000  # 5 minutes - timeout for stuck events in PROCESSING
